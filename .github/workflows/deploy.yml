name: Deploy Backend to AWS
on:
  push:
    branches: [ main ] # Tự động chạy khi bạn push code lên branch main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 21 # Đảm bảo khớp với phiên bản Java bạn đang dùng
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        run: chmod +x gradlew && ./gradlew clean bootJar -x test

      - name: Deploy to Server via SSH
        uses: appleboy/scp-action@master
        with:
          host: 3.107.235.9
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "build/libs/*.jar"
          target: "/home/ubuntu/nhom1_qac/backend/dist"
          strip_components: 2 # Chỉ lấy file .jar, không lấy cả thư mục build/libs

      - name: Restart Application
        uses: appleboy/ssh-action@master
        with:
          host: 3.107.235.9
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/nhom1_qac/backend/dist
            # Tắt app cũ đang chiếm port 8080
            sudo fuser -k 8080/tcp || true
            # Chạy app mới dưới nền (Background)
            nohup java -jar *.jar > app.log 2>&1 &