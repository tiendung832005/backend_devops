name: Deploy Backend to AWS
on:
  push:
    branches: [main, master] # Hỗ trợ cả branch main hoặc master
  workflow_dispatch: # Cho phép chạy manual

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/rikkei-backend
  SERVER_HOST: 3.107.235.9
  SERVER_USER: ubuntu

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Set up JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: "21"
          distribution: "temurin"

      # 3. Build JAR with Gradle
      - name: Build JAR
        run: |
          chmod +x gradlew
          ./gradlew clean bootJar -x test

      # 4. Deploy JAR and nginx.conf to Server
      - name: Copy JAR and config to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "build/libs/*.jar,nginx.conf"
          target: "/home/ubuntu/backend-app"
          strip_components: 2

      # 5. Deploy application on Server
      - name: Deploy on Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/backend-app

            # Stop old process
            pkill -f 'java.*jar' || true
            sleep 3

            # Start new backend
            nohup java -jar *.jar > app.log 2>&1 &
            
            # Wait for startup
            echo "Waiting for backend to start..."
            sleep 20

            # Check health
            echo "--- Health check ---"
            curl -f http://localhost:8080/actuator/health || echo "Health check failed"
            
            # Show logs
            echo "--- Backend logs (last 30 lines) ---"
            tail -n 30 app.log

            # Configure Nginx
            if [ ! -f /etc/nginx/sites-available/rikkei ]; then
              sudo cp nginx.conf /etc/nginx/sites-available/rikkei
              sudo ln -s /etc/nginx/sites-available/rikkei /etc/nginx/sites-enabled/ || true
              sudo mkdir -p /var/log/nginx
              sudo nginx -t && sudo systemctl reload nginx
            fi
