name: Deploy Backend to AWS
on:
  push:
    branches: [main, master] # Hỗ trợ cả branch main hoặc master
  workflow_dispatch: # Cho phép chạy manual

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/rikkei-backend
  SERVER_HOST: 3.107.235.9
  SERVER_USER: ubuntu

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Set up JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: "21"
          distribution: "temurin"

      # 3. Build JAR with Gradle
      - name: Build JAR
        run: |
          chmod +x gradlew
          ./gradlew clean bootJar -x test --no-daemon --max-workers=2
        env:
          GRADLE_OPTS: "-Xmx2048m -XX:MaxMetaspaceSize=512m"

      # 4. Deploy JAR and nginx.conf to Server
      - name: Copy JAR and config to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "build/libs/*.jar,nginx.conf"
          target: "/home/ubuntu/backend-app"
          strip_components: 2

      # 5. Deploy application on Server
      - name: Deploy on Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 5m
          script: |
            set -e
            cd /home/ubuntu/backend-app

            # Stop old process
            pkill -f 'java.*jar' || true
            sleep 2

            # Start backend in background
            nohup java -jar *.jar > app.log 2>&1 < /dev/null &

            # Save PID
            echo $! > backend.pid

            # Wait and check
            sleep 15

            # Quick health check
            curl -f http://localhost:8080/actuator/health && echo "Backend started successfully" || echo "Backend starting, check logs later"

            # Configure Nginx if needed
            if [ ! -f /etc/nginx/sites-available/rikkei ]; then
              sudo cp nginx.conf /etc/nginx/sites-available/rikkei 2>/dev/null || true
              sudo ln -sf /etc/nginx/sites-available/rikkei /etc/nginx/sites-enabled/ 2>/dev/null || true
              sudo mkdir -p /var/log/nginx
              sudo nginx -t && sudo systemctl reload nginx || true
            fi

            echo "Deployment completed"
            fi
