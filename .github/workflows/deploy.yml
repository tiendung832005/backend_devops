name: Deploy Backend to AWS
on:
  push:
    branches: [ main, master ] # Hỗ trợ cả branch main hoặc master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        run: chmod +x gradlew && ./gradlew clean bootJar -x test

      - name: Deploy to Server via SSH
        uses: appleboy/scp-action@master
        with:
          host: 3.107.235.9
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "build/libs/*.jar"
          target: "/home/ubuntu/deploy_dist"
          strip_components: 2

      - name: Restart Application
        uses: appleboy/ssh-action@master
        with:
          host: 3.107.235.9
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /home/ubuntu/deploy_dist
            cd /home/ubuntu/deploy_dist
            
            # Tắt app cũ đang chiếm port 8080 (nếu có)
            sudo fuser -k 8080/tcp || true
            
            # Chạy app mới dưới nền và lưu log vào app.log
            # Sử dụng '&' để lệnh không bị treo GitHub Actions
            nohup java -jar *.jar > app.log 2>&1 &
            
            # Đợi 5 giây để app kịp khởi động rồi in log ra kiểm tra
            sleep 5
            echo "--- Kiểm tra log khởi động ---"
            cat app.log | head -n 50