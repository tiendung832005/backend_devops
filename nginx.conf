# Nginx configuration for Rikkei Backend Application
# upstream backend {
#     server localhost:8080;
# }

server {
    listen 80;
    server_name domain.rikkei.edu.vn;  # Thay thế bằng domain thực tế của bạn

    # Giới hạn dung lượng upload file (50MB)
    client_max_body_size 50M;

    # Bật gzip compression để tối ưu
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;
    gzip_disable "MSIE [1-6]\.";
    gzip_comp_level 6;

    # Logging
    access_log /var/log/nginx/rikkei_access.log;
    error_log /var/log/nginx/rikkei_error.log;

    # Proxy cho Backend API
    location /api {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # WebSocket support (nếu cần cho notifications)
    location /ws {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # Health check endpoint
    location /actuator/health {
        proxy_pass http://localhost:8080/actuator/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # Default location cho Frontend (nếu sau này cần)
    # location / {
    #     proxy_pass http://localhost:3000;  # Frontend port
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # }

    # Hoặc nếu chỉ có Backend API, redirect root về /api
    location / {
        return 301 /api;
    }
}
